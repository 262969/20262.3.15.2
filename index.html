<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>资源安全访问通道</title>
    <!-- 引入 Font Awesome 图标 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-color: #ffffff;
            --accent-color: #00f2fe;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #0f0c29;
            background: linear-gradient(to right, #24243e, #302b63, #0f0c29);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            color: var(--text-color);
        }

        /* 背景动效 */
        .bg-orb {
            position: absolute; border-radius: 50%; filter: blur(80px); z-index: 0;
            animation: floatOrb 10s infinite ease-in-out; opacity: 0.6;
        }
        .orb-1 { width: 300px; height: 300px; background: #764ba2; top: -50px; left: -50px; }
        .orb-2 { width: 400px; height: 400px; background: #667eea; bottom: -100px; right: -100px; animation-delay: -5s; }
        .orb-3 { width: 200px; height: 200px; background: #00f2fe; top: 40%; left: 60%; animation-delay: -2s; opacity: 0.4; }

        @keyframes floatOrb {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, 50px) scale(1.1); }
        }

        .particles {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
            background-image: radial-gradient(circle at 20% 30%, rgba(255,255,255,0.1) 1px, transparent 1px),
                              radial-gradient(circle at 80% 70%, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 50px 50px; opacity: 0.3; animation: moveParticles 20s linear infinite;
        }
        @keyframes moveParticles { from { background-position: 0 0; } to { background-position: 50px 50px; } }

        /* 主卡片 */
        .card-container {
            position: relative; z-index: 10; width: 90%; max-width: 480px;
            padding: 40px 30px; background: var(--glass-bg); backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px); border-radius: 30px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(255, 255, 255, 0.05);
            text-align: center; transform: translateY(20px); opacity: 0;
            animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }
        @keyframes slideUp { to { transform: translateY(0); opacity: 1; } }

        /* 图标 */
        .icon-box {
            width: 100px; height: 100px; margin: 0 auto 25px;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); position: relative;
        }
        .icon-box i {
            font-size: 3.5rem; background: linear-gradient(to bottom, #fff, #a5b4fc);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(165, 180, 252, 0.5));
            animation: pulseIcon 2s infinite ease-in-out;
        }
        @keyframes pulseIcon { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        .ripple {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 100%; height: 100%; border-radius: 50%; border: 1px solid rgba(255, 255, 255, 0.3);
            animation: rippleEffect 2s infinite linear;
        }
        .ripple:nth-child(2) { animation-delay: 0.5s; }
        .ripple:nth-child(3) { animation-delay: 1s; }
        @keyframes rippleEffect {
            0% { width: 100%; height: 100%; opacity: 0.8; border-width: 2px; }
            100% { width: 200%; height: 200%; opacity: 0; border-width: 0px; }
        }

        h1 {
            font-size: 1.8rem; font-weight: 700; margin-bottom: 15px; line-height: 1.4;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
            background: linear-gradient(to right, #fff, #e0e7ff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        p { font-size: 1rem; color: rgba(255, 255, 255, 0.8); line-height: 1.6; margin-bottom: 30px; font-weight: 300; }

        /* 按钮 */
        .action-btn {
            display: inline-block; padding: 15px 40px; background: var(--primary-gradient);
            color: white; text-decoration: none; border-radius: 50px; font-weight: 600;
            font-size: 1.1rem; box-shadow: 0 10px 20px rgba(118, 75, 162, 0.4);
            transition: all 0.3s ease; border: 1px solid rgba(255,255,255,0.2);
            cursor: pointer; position: relative; overflow: hidden;
        }
        .action-btn::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent); transition: 0.5s;
        }
        .action-btn:hover::before { left: 100%; }
        .action-btn:active { transform: scale(0.95); }

        .status-msg { margin-top: 20px; font-size: 0.9rem; color: rgba(255,255,255,0.6); min-height: 20px; }

        /* 电脑端提示区 */
        .pc-hint {
            display: none; background: rgba(0, 0, 0, 0.2); padding: 20px;
            border-radius: 15px; margin-top: 20px; border: 1px solid rgba(255,255,255,0.1);
        }
        
        /* 二维码样式 - 引用本地文件 qrcode.png */
        .qr-placeholder {
            width: 150px; height: 150px; margin: 15px auto; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.95); /* 纯白底，确保扫描率 */
            padding: 10px; box-shadow: 0 0 15px rgba(0,0,0,0.3);
        }
        .qr-placeholder img { width: 100%; height: 100%; object-fit: contain; }

        .loader {
            border: 3px solid rgba(255,255,255,0.1); border-left-color: #fff;
            border-radius: 50%; width: 24px; height: 24px;
            animation: spin 1s linear infinite; display: inline-block;
            vertical-align: middle; margin-right: 10px;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        @media (max-width: 480px) {
            .card-container { padding: 30px 20px; }
            h1 { font-size: 1.5rem; }
            .icon-box { width: 80px; height: 80px; }
            .icon-box i { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-orb orb-3"></div>
    <div class="particles"></div>

    <div class="card-container">
        <div class="icon-box">
            <div class="ripple"></div><div class="ripple"></div><div class="ripple"></div>
            <i class="fas fa-mobile-screen-button" id="main-icon"></i>
        </div>

        <h1 id="title-text">正在验证资源...</h1>
        <p id="desc-text">系统正在连接云端数据库，请稍候。</p>

        <div id="loading-area" style="display: flex; justify-content: center; align-items: center;">
            <div class="loader"></div><span>安全校验中</span>
        </div>

        <!-- 移动端操作区 -->
        <div id="mobile-action" style="display: none;">
            <button class="action-btn" onclick="performRedirect()">
                <i class="fas fa-arrow-right-to-bracket" style="margin-right: 8px;"></i> 立即前往下载
            </button>
            <div class="status-msg">即将跳转至官方网盘页</div>
        </div>

        <!-- 电脑端操作区 -->
        <div id="pc-action" class="pc-hint">
            <div style="font-size: 1.1rem; font-weight: 600; margin-bottom: 10px; color: #fff;">
                <i class="fas fa-desktop" style="color: #00f2fe; margin-right: 8px;"></i> 电脑端无法直接下载
            </div>
            <p style="font-size: 0.9rem; margin-bottom: 0;">
                为了保障资源完整性与下载速度，<br>请使用手机浏览器或微信扫描下方二维码访问。
            </p>
            
            <!-- 这里引用你上传的 qrcode.png -->
            <div class="qr-placeholder">
                <img src="qrcode.png" alt="手机访问二维码">
            </div>
            
            <p style="font-size: 0.8rem; color: rgba(255,255,255,0.5); margin-top: 10px;">
                或直接复制当前网址发送到手机
            </p>
        </div>
    </div>

    <script>
        (async function() {
            const config = {
                isMobile: /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)
            };

            const els = {
                title: document.getElementById('title-text'),
                desc: document.getElementById('desc-text'),
                loading: document.getElementById('loading-area'),
                mobileAction: document.getElementById('mobile-action'),
                pcAction: document.getElementById('pc-action'),
                icon: document.getElementById('main-icon')
            };

            // 1. 获取 URL 中的 id 参数
            const urlParams = new URLSearchParams(window.location.search);
            let resourceId = urlParams.get('id');

            // 【重要逻辑】如果用户直接访问首页没带参数，提示用户
            if (!resourceId) {
                showError("请在网址后添加资源ID<br>例如：?id=46633-别惹真公主");
                // 如果你想测试，可以取消下面这行的注释，强制指定一个 ID
                // resourceId = "46633-别惹真公主，她有仇是真报啊（60集）白雪茹＆潘霖"; 
                return;
            }

            try {
                // 2. 读取 links.json
                // 注意：GitHub Pages 可能需要一点时间缓存新文件
                const response = await fetch('links.json');
                if (!response.ok) throw new Error("无法读取配置文件");
                const data = await response.json();

                // 3. 查找对应的链接
                // 这里的 key 必须和 json 里的一模一样（包括空格和标点）
                const targetUrl = data[resourceId];

                if (!targetUrl) {
                    // 如果精确匹配不到，尝试模糊匹配（可选优化，防止 ID 输错一点点）
                    // 这里暂时保持严格匹配，确保准确性
                    showError(`未找到资源：<br>"${resourceId}"<br>请检查链接是否正确`);
                    return;
                }

                // 4. 验证成功，更新界面
                els.loading.style.display = 'none';
                
                // 更改图标为成功状态
                els.icon.className = 'fas fa-check-circle';
                els.icon.style.background = 'linear-gradient(to bottom, #4ade80, #16a34a)';
                els.icon.style.webkitBackgroundClip = 'text';
                els.icon.style.webkitTextFillColor = 'transparent';
                
                els.title.innerText = "资源验证通过";
                els.desc.innerText = "已为您准备好高速下载通道";

                if (config.isMobile) {
                    // === 手机端：显示按钮 ===
                    els.mobileAction.style.display = 'block';
                    window.targetLink = targetUrl; 
                } else {
                    // === 电脑端：显示二维码 ===
                    els.pcAction.style.display = 'block';
                    els.desc.innerText = "检测到电脑环境，请转移至手机下载";
                    els.title.innerText = "请在手机端打开";
                }

            } catch (err) {
                console.error(err);
                showError("系统繁忙，请稍后重试<br>(Error: " + err.message + ")");
            }

            function showError(msg) {
                els.loading.style.display = 'none';
                els.icon.className = 'fas fa-exclamation-triangle';
                els.icon.style.background = 'linear-gradient(to bottom, #f87171, #dc2626)';
                els.icon.style.webkitBackgroundClip = 'text';
                els.icon.style.webkitTextFillColor = 'transparent';
                els.title.innerText = "访问失败";
                els.desc.innerHTML = msg;
            }
        })();

        function performRedirect() {
            if (window.targetLink) {
                const btn = document.querySelector('.action-btn');
                btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> 跳转中...';
                btn.style.opacity = '0.8';
                setTimeout(() => {
                    window.location.href = window.targetLink;
                }, 800);
            }
        }
    </script>
</body>
</html>
