<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>资源访问指引</title>
    <!-- 引入 Font Awesome 图标 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-color: #ffffff;
            --accent-color: #00f2fe;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #0f0c29;
            background: linear-gradient(to right, #24243e, #302b63, #0f0c29);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            color: var(--text-color);
        }

        /* 动态背景光斑 */
        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            animation: floatOrb 10s infinite ease-in-out;
            opacity: 0.6;
        }

        .orb-1 {
            width: 300px;
            height: 300px;
            background: #764ba2;
            top: -50px;
            left: -50px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            background: #667eea;
            bottom: -100px;
            right: -100px;
            animation-delay: -5s;
        }

        .orb-3 {
            width: 200px;
            height: 200px;
            background: #00f2fe;
            top: 40%;
            left: 60%;
            animation-delay: -2s;
            opacity: 0.4;
        }

        @keyframes floatOrb {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, 50px) scale(1.1); }
        }

        /* 粒子背景 (CSS 模拟) */
        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(255,255,255,0.1) 1px, transparent 1px),
                radial-gradient(circle at 80% 70%, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.3;
            animation: moveParticles 20s linear infinite;
        }

        @keyframes moveParticles {
            from { background-position: 0 0; }
            to { background-position: 50px 50px; }
        }

        /* 主卡片容器 */
        .card-container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 480px;
            padding: 40px 30px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(255, 255, 255, 0.05);
            text-align: center;
            transform: translateY(20px);
            opacity: 0;
            animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        @keyframes slideUp {
            to { transform: translateY(0); opacity: 1; }
        }

        /* 图标区域 */
        .icon-box {
            width: 100px;
            height: 100px;
            margin: 0 auto 25px;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            position: relative;
        }

        .icon-box i {
            font-size: 3.5rem;
            background: linear-gradient(to bottom, #fff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(165, 180, 252, 0.5));
            animation: pulseIcon 2s infinite ease-in-out;
        }

        @keyframes pulseIcon {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* 波纹装饰 */
        .ripple {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.3);
            animation: rippleEffect 2s infinite linear;
        }
        .ripple:nth-child(2) { animation-delay: 0.5s; }
        .ripple:nth-child(3) { animation-delay: 1s; }

        @keyframes rippleEffect {
            0% { width: 100%; height: 100%; opacity: 0.8; border-width: 2px; }
            100% { width: 200%; height: 200%; opacity: 0; border-width: 0px; }
        }

        /* 文字内容 */
        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 15px;
            line-height: 1.4;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
            background: linear-gradient(to right, #fff, #e0e7ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.6;
            margin-bottom: 30px;
            font-weight: 300;
        }

        /* 按钮样式 */
        .action-btn {
            display: inline-block;
            padding: 15px 40px;
            background: var(--primary-gradient);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.1rem;
            box-shadow: 0 10px 20px rgba(118, 75, 162, 0.4);
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.2);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .action-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: 0.5s;
        }

        .action-btn:hover::before {
            left: 100%;
        }

        .action-btn:active {
            transform: scale(0.95);
        }

        /* 状态提示 */
        .status-msg {
            margin-top: 20px;
            font-size: 0.9rem;
            color: rgba(255,255,255,0.6);
            min-height: 20px;
        }

        /* 电脑端特有样式 */
        .pc-hint {
            display: none;
            background: rgba(0, 0, 0, 0.2);
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        /* 修改了二维码容器样式，去掉了白色背景，适应你的图片 */
        .qr-placeholder {
            width: 150px;
            height: 150px;
            margin: 15px auto;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.9); /* 给二维码加个白底，扫描更清晰 */
            padding: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.3);
        }

        /* 加载动画 */
        .loader {
            border: 3px solid rgba(255,255,255,0.1);
            border-left-color: #fff;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 10px;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* 响应式调整 */
        @media (max-width: 480px) {
            .card-container { padding: 30px 20px; }
            h1 { font-size: 1.5rem; }
            .icon-box { width: 80px; height: 80px; }
            .icon-box i { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <!-- 背景元素 -->
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-orb orb-3"></div>
    <div class="particles"></div>

    <!-- 主卡片 -->
    <div class="card-container">
        <div class="icon-box">
            <div class="ripple"></div>
            <div class="ripple"></div>
            <div class="ripple"></div>
            <i class="fas fa-mobile-screen-button" id="main-icon"></i>
        </div>

        <h1 id="title-text">正在为您准备资源...</h1>
        <p id="desc-text">系统正在验证访问权限，请稍候。</p>

        <!-- 加载状态 -->
        <div id="loading-area" style="display: flex; justify-content: center; align-items: center;">
            <div class="loader"></div>
            <span>安全校验中</span>
        </div>

        <!-- 成功后的按钮 (仅移动端可见) -->
        <div id="mobile-action" style="display: none;">
            <button class="action-btn" onclick="performRedirect()">
                <i class="fas fa-arrow-right-to-bracket" style="margin-right: 8px;"></i> 立即前往
            </button>
            <div class="status-msg">即将跳转至官方资源页</div>
        </div>

        <!-- 电脑端提示 (仅 PC 可见) -->
        <div id="pc-action" class="pc-hint">
            <div style="font-size: 1.1rem; font-weight: 600; margin-bottom: 10px; color: #fff;">
                <i class="fas fa-desktop" style="color: #00f2fe; margin-right: 8px;"></i> 电脑端无法直接下载
            </div>
            <p style="font-size: 0.9rem; margin-bottom: 0;">
                为了保障资源安全与体验，<br>请使用手机浏览器或微信扫描下方二维码访问。
            </p>
            
            <!-- 【修改处】这里直接引用你上传的 qrcode.png -->
            <div class="qr-placeholder">
                <img src="qrcode.png" alt="手机访问二维码" style="width:100%; height:100%; display: block;">
            </div>
            
            <p style="font-size: 0.8rem; color: rgba(255,255,255,0.5); margin-top: 10px;">
                或使用手机访问当前网址
            </p>
        </div>
    </div>

    <script>
        (async function() {
            // 配置项
            const config = {
                redirectDelay: 800, 
                isMobile: /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)
            };

            // DOM 元素
            const els = {
                title: document.getElementById('title-text'),
                desc: document.getElementById('desc-text'),
                loading: document.getElementById('loading-area'),
                mobileAction: document.getElementById('mobile-action'),
                pcAction: document.getElementById('pc-action'),
                icon: document.getElementById('main-icon')
            };

            // 获取 ID
            const urlParams = new URLSearchParams(window.location.search);
            const resourceId = urlParams.get('id');

            if (!resourceId) {
                showError("缺少资源标识 (ID)");
                return;
            }

            try {
                // 1. 获取数据
                const response = await fetch('links.json');
                if (!response.ok) throw new Error("网络响应异常");
                const data = await response.json();

                const targetUrl = data[resourceId];

                if (!targetUrl) {
                    showError("未找到该资源，请检查链接是否正确");
                    return;
                }

                // 2. 验证成功，更新 UI
                els.loading.style.display = 'none';
                els.icon.className = 'fas fa-check-circle';
                els.icon.style.background = 'linear-gradient(to bottom, #4ade80, #16a34a)';
                els.icon.style.webkitBackgroundClip = 'text';
                els.icon.style.webkitTextFillColor = 'transparent';
                
                els.title.innerText = "资源验证通过";
                els.desc.innerText = "已准备好安全下载通道";

                if (config.isMobile) {
                    // === 手机端逻辑 ===
                    els.mobileAction.style.display = 'block';
                    window.targetLink = targetUrl; 
                } else {
                    // === 电脑端逻辑 ===
                    els.pcAction.style.display = 'block';
                    els.desc.innerText = "检测到电脑环境，请转移至手机";
                    els.title.innerText = "请在手机端打开";
                }

            } catch (err) {
                console.error(err);
                showError("系统繁忙，请稍后重试");
            }

            function showError(msg) {
                els.loading.style.display = 'none';
                els.icon.className = 'fas fa-exclamation-triangle';
                els.icon.style.background = 'linear-gradient(to bottom, #f87171, #dc2626)';
                els.icon.style.webkitBackgroundClip = 'text';
                els.icon.style.webkitTextFillColor = 'transparent';
                els.title.innerText = "访问失败";
                els.desc.innerText = msg;
            }
        })();

        // 执行跳转函数
        function performRedirect() {
            if (window.targetLink) {
                const btn = document.querySelector('.action-btn');
                const originalText = btn.innerHTML;
                btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> 跳转中...';
                btn.style.opacity = '0.8';
                
                setTimeout(() => {
                    window.location.href = window.targetLink;
                }, 800);
            }
        }
    </script>
</body>
</html>
